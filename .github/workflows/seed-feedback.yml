name: Seed Multi-Persona Feedback

on:
  workflow_dispatch:
    inputs:
      mcp_key:
        description: 'MCP API key (ahub_...)'
        required: true
        type: string
      summarize_only:
        description: 'Skip feedback insertion and only generate AI summaries'
        required: false
        type: boolean
        default: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/artifact-multi-persona-feedback-me1yqx

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Seed feedback via MCP
        env:
          MCP_KEY: ${{ inputs.mcp_key }}
        run: node scripts/seed-feedback.mjs ${{ inputs.summarize_only == 'true' && '--summarize-only' || '' }}
